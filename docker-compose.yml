version: '3'

services:

  node-app:
    build: .
    container_name: pharma-server
    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest
    container_name: pharma-nginx
    ports:
      - "80:80"

    volumes:
      - ./public:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - node-app